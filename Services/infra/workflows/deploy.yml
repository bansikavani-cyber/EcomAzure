name: Azure Infrastructure Deployment

on:
  push:
    branches:
      - main

jobs:

  # -------------------------------
  # DEV
  # -------------------------------
  deploy-dev:
    runs-on: ubuntu-latest

    env:
      RESOURCE_GROUP: ecomazure-rg-dev
      PARAMETERS_FILE: infra/parameters/dev.parameters.json
      LOCATION: eastus

    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create DEV Resource Group
        run: |
          az group create --name $RESOURCE_GROUP --location $LOCATION

      - name: Deploy DEV Bicep
        run: |
          az deployment group create \
            --resource-group $RESOURCE_GROUP \
            --template-file infra/main.bicep \
            --parameters @$PARAMETERS_FILE


  # -------------------------------
  # QA
  # -------------------------------
  deploy-qa:
    runs-on: ubuntu-latest
    needs: deploy-dev

    env:
      RESOURCE_GROUP: ecomazure-rg-qa
      PARAMETERS_FILE: infra/parameters/qa.parameters.json
      LOCATION: eastus

    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create QA Resource Group
        run: |
          az group create --name $RESOURCE_GROUP --location $LOCATION

      - name: Deploy QA Bicep
        run: |
          az deployment group create \
            --resource-group $RESOURCE_GROUP \
            --template-file infra/main.bicep \
            --parameters @$PARAMETERS_FILE


  # -------------------------------
  # PROD (Manual Approval)
  # -------------------------------
  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-qa

    environment:
      name: prod   # Configure approval in GitHub

    env:
      RESOURCE_GROUP: ecomazure-rg-prod
      PARAMETERS_FILE: infra/parameters/prod.parameters.json
      LOCATION: eastus

    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create PROD Resource Group
        run: |
          az group create --name $RESOURCE_GROUP --location $LOCATION

      - name: Deploy PROD Bicep
        run: |
          az deployment group create \
            --resource-group $RESOURCE_GROUP \
            --template-file infra/main.bicep \
            --parameters @$PARAMETERS_FILE