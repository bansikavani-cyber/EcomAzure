name: AzureInfraDeployment

trigger:
- main  # Runs automatically on main branch

pool:
  vmImage: 'ubuntu-latest'

variables:
  LOCATION: 'eastus'
  DevResourceGroup: 'ecomazure-rg-dev'
  DevParameters: 'infra/parameters/dev.parameters.json'
  QAResourceGroup: 'ecomazure-rg-qa'
  QAParameters: 'infra/parameters/qa.parameters.json'
  ProdResourceGroup: 'ecomazure-rg-prod'
  ProdParameters: 'infra/parameters/prod.parameters.json'
  BicepFile: 'infra/main.bicep'

stages:

# -----------------------
# Stage 1: DEV
# -----------------------
- stage: Deploy_Dev
  displayName: 'Deploy to DEV'
  jobs:
  - job: Dev
    displayName: 'Deploy Bicep to DEV'
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Create DEV Resource Group'
      inputs:
        azureSubscription: 'EcomAzureInfraSub'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az group create --name $(DevResourceGroup) --location $(LOCATION)

    - task: AzureCLI@2
      displayName: 'Deploy DEV Bicep'
      inputs:
        azureSubscription: 'EcomAzureInfraSub'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az deployment group create \
            --resource-group $(DevResourceGroup) \
            --template-file $(BicepFile) \
            --parameters @$(DevParameters)

# -----------------------
# Stage 2: QA
# -----------------------
- stage: Deploy_QA
  displayName: 'Deploy to QA'
  dependsOn: Deploy_Dev
  condition: succeeded()
  jobs:
  - job: QA
    displayName: 'Deploy Bicep to QA'
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Create QA Resource Group'
      inputs:
        azureSubscription: 'EcomAzureInfraSub'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az group create --name $(QAResourceGroup) --location $(LOCATION)

    - task: AzureCLI@2
      displayName: 'Deploy QA Bicep'
      inputs:
        azureSubscription: 'EcomAzureInfraSub'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az deployment group create \
            --resource-group $(QAResourceGroup) \
            --template-file $(BicepFile) \
            --parameters @$(QAParameters)

# -----------------------
# Stage 3: PROD (Manual Approval)
# -----------------------
- stage: Deploy_Prod
  displayName: 'Deploy to PROD'
  dependsOn: Deploy_QA
  condition: succeeded()
  jobs:
  - deployment: Prod
    displayName: 'Deploy Bicep to PROD'
    environment: 'prod'  # Manual approval configured here
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Create PROD Resource Group'
            inputs:
              azureSubscription: 'EcomAzureInfraSub'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az group create --name $(ProdResourceGroup) --location $(LOCATION)

          - task: AzureCLI@2
            displayName: 'Deploy PROD Bicep'
            inputs:
              azureSubscription: 'EcomAzureInfraSub'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment group create \
                  --resource-group $(ProdResourceGroup) \
                  --template-file $(BicepFile) \
                  --parameters @$(ProdParameters)